<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wellhub Wrapped ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg: #080810;
  --surface: #12121f;
  --card: #1a1a2e;
  --border: rgba(255,255,255,0.08);
  --text: #f0f0ff;
  --muted: #888;
  --accent1: #FF6B6B;
  --accent2: #FFE66D;
  --accent3: #4ECDC4;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Poppins', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── NAVBAR ──────────────────────────────────────────────── */
nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(8,8,16,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 0;
  padding: 0 24px;
  height: 60px;
}

.nav-brand {
  font-weight: 800;
  font-size: 1.1rem;
  background: linear-gradient(90deg, #FF6B6B, #FFE66D, #4ECDC4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-right: auto;
  letter-spacing: -0.5px;
}

.nav-tabs {
  display: flex;
  gap: 4px;
}

.nav-tab {
  padding: 8px 20px;
  border-radius: 100px;
  border: none;
  background: transparent;
  color: var(--muted);
  font-family: 'Poppins', sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.nav-tab.active {
  background: rgba(255,255,255,0.1);
  color: #fff;
}

.nav-tab:hover:not(.active) {
  color: #ccc;
  background: rgba(255,255,255,0.05);
}

/* ── PAGE SECTIONS ───────────────────────────────────────── */
.page { display: none; padding: 32px 24px 80px; max-width: 1100px; margin: 0 auto; }
.page.active { display: block; animation: fadeUp 0.4s ease both; }

@keyframes fadeUp {
  from { opacity:0; transform:translateY(20px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── YEAR PAGE ───────────────────────────────────────────── */
.year-selector {
  display: flex;
  gap: 10px;
  margin-bottom: 36px;
  flex-wrap: wrap;
}

.year-pill {
  padding: 10px 28px;
  border-radius: 100px;
  border: 2px solid rgba(255,255,255,0.15);
  background: transparent;
  color: var(--muted);
  font-family: 'Poppins', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.25s;
  letter-spacing: 1px;
}

.year-pill.active {
  border-color: transparent;
  background: linear-gradient(135deg, #FF6B6B, #FFE66D);
  color: #000;
}

.year-pill:hover:not(.active) {
  border-color: rgba(255,255,255,0.3);
  color: #fff;
}

/* ── YEAR CONTENT ────────────────────────────────────────── */
.year-content { display: none; }
.year-content.active { display: block; animation: fadeUp 0.35s ease both; }

.stats-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}

@media(max-width:640px){ .stats-row{ grid-template-columns:1fr; } }

/* ── HERO CARD ───────────────────────────────────────────── */
.hero-card {
  grid-column: 1 / -1;
  border-radius: 24px;
  padding: 40px 36px;
  position: relative;
  overflow: hidden;
  min-height: 220px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.hero-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--grad, linear-gradient(135deg, #FF6B6B, #FFE66D, #4ECDC4));
  z-index: 0;
}

.hero-card > * { position: relative; z-index: 1; }

.hero-label {
  font-size: 0.8rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 2px;
  opacity: 0.75;
  margin-bottom: 10px;
}

.hero-class {
  font-size: clamp(2rem, 5vw, 3.5rem);
  font-weight: 900;
  line-height: 1.05;
  letter-spacing: -1px;
  margin-bottom: 12px;
}

.hero-count {
  font-size: 1.1rem;
  font-weight: 600;
  opacity: 0.85;
}

.hero-count span {
  font-size: 1.8rem;
  font-weight: 900;
}

.hero-emoji {
  position: absolute;
  right: 36px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 7rem;
  opacity: 0.2;
  pointer-events: none;
}

/* ── STAT CARDS ──────────────────────────────────────────── */
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 28px 24px;
  position: relative;
  overflow: hidden;
}

.stat-card .accent-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  border-radius: 20px 20px 0 0;
}

.stat-label {
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--muted);
  margin-bottom: 10px;
  margin-top: 4px;
}

.stat-value {
  font-size: 1.8rem;
  font-weight: 800;
  line-height: 1.1;
  margin-bottom: 6px;
}

.stat-sub {
  font-size: 0.82rem;
  color: var(--muted);
}

/* ── CHART CARD ──────────────────────────────────────────── */
.chart-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 28px 24px 24px;
  margin-top: 16px;
}

.chart-title {
  font-size: 0.85rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
  margin-bottom: 20px;
}

.chart-wrap { position: relative; }

/* ── STUDIO PAGE ─────────────────────────────────────────── */
.page-header {
  margin-bottom: 32px;
}

.page-title {
  font-size: clamp(1.8rem, 4vw, 2.8rem);
  font-weight: 900;
  letter-spacing: -1px;
  background: linear-gradient(90deg, #FF6B6B, #FFE66D);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}

.page-subtitle {
  color: var(--muted);
  font-size: 1rem;
}

.studio-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 20px;
}

/* ── STUDIO CARD ─────────────────────────────────────────── */
.studio-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s;
}

.studio-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

.studio-header {
  padding: 28px 24px 20px;
  position: relative;
}

.studio-rank {
  position: absolute;
  top: 16px;
  right: 20px;
  font-size: 2.5rem;
  font-weight: 900;
  opacity: 0.18;
}

.studio-name {
  font-size: 1.4rem;
  font-weight: 800;
  margin-bottom: 6px;
  line-height: 1.2;
}

.studio-visits {
  display: flex;
  align-items: baseline;
  gap: 6px;
}

.studio-visits .big-num {
  font-size: 2.6rem;
  font-weight: 900;
  line-height: 1;
}

.studio-visits .label {
  font-size: 0.9rem;
  opacity: 0.7;
  font-weight: 500;
}

.studio-body {
  padding: 0 24px 24px;
}

.info-chips {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}

.chip {
  padding: 5px 12px;
  border-radius: 100px;
  font-size: 0.75rem;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 5px;
}

.chip-day {
  background: rgba(78,205,196,0.15);
  color: #4ECDC4;
  border: 1px solid rgba(78,205,196,0.25);
}

.chip-type {
  background: rgba(255,230,109,0.12);
  color: #FFE66D;
  border: 1px solid rgba(255,230,109,0.2);
  max-width: 220px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── DAY BARS ────────────────────────────────────────────── */
.day-section-label {
  font-size: 0.65rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
  margin-bottom: 10px;
}

.day-bars {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.day-row {
  display: grid;
  grid-template-columns: 30px 1fr 24px;
  align-items: center;
  gap: 8px;
}

.day-abbr {
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--muted);
  text-align: right;
}

.day-bar-track {
  height: 6px;
  background: rgba(255,255,255,0.07);
  border-radius: 3px;
  overflow: hidden;
}

.day-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.6s ease;
}

.day-count {
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--muted);
  text-align: right;
}

/* ── CLASS TYPE LIST ─────────────────────────────────────── */
.types-section {
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}

.types-label {
  font-size: 0.65rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
  margin-bottom: 8px;
}

.type-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.type-pill {
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 0.72rem;
  font-weight: 500;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: #ccc;
}

.type-pill.top {
  background: rgba(255,107,107,0.15);
  border-color: rgba(255,107,107,0.25);
  color: #FF6B6B;
  font-weight: 700;
}

/* ── CALENDAR PAGE ───────────────────────────────────────── */
.cal-year-selector {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}

.cal-content { display: none; }
.cal-content.active { display: block; animation: fadeUp 0.35s ease both; }

.cal-grand-total {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.cal-grand-num {
  font-size: clamp(3rem, 8vw, 5.5rem);
  font-weight: 900;
  line-height: 1;
  background: linear-gradient(90deg, #FF6B6B, #FFE66D, #4ECDC4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -3px;
}

.cal-grand-label {
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--muted);
}

.cal-year-total {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 6px 18px;
  font-size: 0.82rem;
  color: var(--muted);
  margin-bottom: 28px;
}

.cal-year-total strong { color: #fff; }

.months-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
}

.month-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px;
}

.month-name {
  font-size: 0.8rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
  margin-bottom: 10px;
}

.dow-headers {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
  margin-bottom: 3px;
}

.dow-header {
  text-align: center;
  font-size: 0.55rem;
  font-weight: 700;
  color: #444;
  letter-spacing: 0.5px;
}

.day-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
}

.day-cell {
  aspect-ratio: 1;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.58rem;
  font-weight: 600;
  cursor: default;
  position: relative;
  transition: transform 0.15s;
}

.day-cell:hover { transform: scale(1.25); z-index: 2; }
.day-cell.empty { background: transparent; }

.day-cell.no-entry {
  background: rgba(255,255,255,0.04);
  color: #333;
}

.day-cell.worked-out {
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  font-weight: 700;
}

.day-cell .day-num { line-height: 1; }

.cal-legend {
  margin-top: 28px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
}

.cal-legend-title {
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--muted);
  margin-bottom: 12px;
}

.legend-items {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 0.78rem;
  color: #aaa;
  font-weight: 500;
}

.legend-dot {
  width: 13px;
  height: 13px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ── QUARTERS ────────────────────────────────────────────── */
.quarters-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
}

@media(max-width:600px) { .quarters-grid { grid-template-columns: repeat(2, 1fr); } }

.quarter-item {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.quarter-label {
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
}

.quarter-pct {
  font-size: 2rem;
  font-weight: 900;
  line-height: 1;
}

.quarter-pct.muted {
  font-size: 1.2rem;
  color: var(--muted);
}

.quarter-bar-track {
  height: 5px;
  background: rgba(255,255,255,0.07);
  border-radius: 3px;
  overflow: hidden;
}

.quarter-bar-fill {
  height: 100%;
  border-radius: 3px;
  background: linear-gradient(90deg, #FF6B6B, #FFE66D);
}

/* ── SCROLLBAR ───────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

/* ── TOTAL BADGE ─────────────────────────────────────────── */
.total-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 4px 14px;
  font-size: 0.8rem;
  color: var(--muted);
  margin-bottom: 28px;
}

.total-badge strong { color: #fff; }
</style>
</head>

<nav>
  <div class="nav-brand">🏋️ Wellhub Wrapped</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('year')">Year in Review</button>
    <button class="nav-tab" onclick="showPage('studio')">By Studio</button>

</nav>

<section class="page active" id="page-year">

</section>

<section class="page" id="page-studio">

  <div class="page-header">
    <div class="page-title">Your Studios</div>
    <div class="page-subtitle">Every class, every visit — ranked by how often you showed up.</div>

</section>

</section>

    // Build bar chart labels/data (exclude top class for colour emphasis)
    const chartLabels = d.all_classes.map(c => c.class);
    const chartData   = d.all_classes.map(c => c.count);
    const chartColors = d.all_classes.map((c, ci) => {
      const cc = COLORS[c.class] || DEFAULT_COLOR;
      // Extract first colour from gradient for the bar
      const m = cc.grad.match(/#[0-9a-fA-F]{6}/g);
      return ci === 0 ? (m ? m[0] : '#FF6B6B') : 'rgba(255,255,255,0.12)';
    });

    panel.innerHTML = `
      <div class="total-badge">
        <span>✦</span>
        <span>You completed <strong>${d.total} classes</strong> in ${y}</span>
      </div>

      <div class="stats-row">
        <div class="hero-card" style="--grad:${YEAR_GRADS[y]}; color:${y==='2025'?'#000':'#fff'}">
          <div class="hero-emoji">${emoji}</div>
          <div class="hero-label">🏆 Your #1 Class</div>
          <div class="hero-class">${d.top_class}</div>
          <div class="hero-count">
            <span class="counter" data-target="${d.top_class_count}">${d.top_class_count}</span> visits
          </div>
        </div>

        <div class="stat-card">
          <div class="accent-bar" style="background:linear-gradient(90deg,#FF6B6B,#FFE66D)"></div>
          <div class="stat-label">🎯 Favourite Class Type</div>
          <div class="stat-value">${d.top_class_type}</div>
          <div class="stat-sub">within ${d.top_class} · ${d.top_class_type_count} times</div>
        </div>

        <div class="stat-card">
          <div class="accent-bar" style="background:linear-gradient(90deg,#4ECDC4,#667eea)"></div>
          <div class="stat-label">📊 Studios Visited</div>
          <div class="stat-value">${d.all_classes.length}</div>
          <div class="stat-sub">unique studios in ${y}</div>
        </div>
      </div>

      <div class="stats-row">
        <div class="stat-card">
          <div class="accent-bar" style="background:linear-gradient(90deg,#EF4444,#991B1B)"></div>
          <div class="stat-label">😴 Most Likely Skip Day</div>
          <div class="stat-value">${d.top_skip_day}s</div>
          <div class="stat-sub">${d.top_skip_count} skips logged</div>
        </div>
        <div class="stat-card">
          <div class="accent-bar" style="background:linear-gradient(90deg,#10B981,#4ECDC4)"></div>
          <div class="stat-label">💪 Consistency</div>
          <div class="stat-value">${d.pct_worked}%</div>
          <div class="stat-sub">of days worked out</div>
        </div>
      </div>

      <div class="chart-card">
        <div class="chart-title">Workout % by Quarter</div>
        <div class="quarters-grid">${quartersHtml}</div>
      </div>

      <div class="chart-card">
        <div class="chart-title">All Classes — Visits Ranked</div>
        <div class="chart-wrap">
          <canvas id="chart-${y}" height="${Math.max(260, chartLabels.length * 36)}"></canvas>
        </div>
      </div>
    `;
    panels.appendChild(panel);

    // Build chart after DOM insert (on next tick)
    setTimeout(() => {
      if (yearCharts[y]) yearCharts[y].destroy();
      const ctx = document.getElementById('chart-' + y);
      if (!ctx) return;
      yearCharts[y] = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: chartLabels,
          datasets: [{
            data: chartData,
            backgroundColor: chartColors,
            borderRadius: 8,
            borderSkipped: false,
          }]
        },
        options: {
          indexAxis: 'y',
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => ` ${ctx.raw} visit${ctx.raw !== 1 ? 's' : ''}`
              }
            }
          },
          scales: {
            x: {
              grid: { color: 'rgba(255,255,255,0.05)' },
              ticks: { color: '#888', font: { family:'Poppins', size:11 } },
            },
            y: {
              grid: { display: false },
              ticks: { color: '#ccc', font: { family:'Poppins', size:12, weight:'600' } },
            }
          }
        }
      });
    }, 50);
  });
}

function selectYear(y) {
  document.querySelectorAll('.year-pill').forEach(b => b.classList.toggle('active', b.textContent === y));
  document.querySelectorAll('.year-content').forEach(p => p.classList.toggle('active', p.id === 'year-' + y));
}

// ── STUDIO PAGE ──────────────────────────────────────────────────
let studiosRendered = false;
function renderStudios() {
  if (studiosRendered) return;
  studiosRendered = true;

  const grid = document.getElementById('studio-grid');
  const studios = DATA.studios;

  Object.entries(studios).forEach(([name, s], i) => {
    const color  = COLORS[name] || DEFAULT_COLOR;
    const emoji  = STUDIO_EMOJI[name] || '🏋️';
    const maxDay = Math.max(...Object.values(s.days));

    const card = document.createElement('div');
    card.className = 'studio-card';

    // Day bars HTML
    const dayBarsHtml = DAY_ORDER.map(day => {
      const cnt = s.days[day] || 0;
      const pct = maxDay > 0 ? (cnt / maxDay * 100).toFixed(1) : 0;
      const isTop = day === s.top_day;
      const barColor = isTop
        ? (color.grad.match(/#[0-9a-fA-F]{6}/g) || ['#FF6B6B'])[0]
        : 'rgba(255,255,255,0.2)';
      return `
        <div class="day-row">
          <span class="day-abbr">${DAY_ABBR[day]}</span>
          <div class="day-bar-track">
            <div class="day-bar-fill" style="width:${pct}%;background:${barColor}"></div>
          </div>
          <span class="day-count">${cnt > 0 ? cnt : ''}</span>
        </div>`;
    }).join('');

    // Type pills HTML
    const typePillsHtml = s.types.map((t, ti) =>
      `<span class="type-pill${ti === 0 ? ' top' : ''}">${t.type} ${ti===0?'·':''} ${ti===0?t.count:''}</span>`
    ).join('');

    card.innerHTML = `
      <div class="studio-header" style="background:${color.grad}; color:${color.text}">
        <div class="studio-rank">#${i+1}</div>
        <div style="font-size:2rem;margin-bottom:8px">${emoji}</div>
        <div class="studio-name">${name}</div>
        <div class="studio-visits">
          <span class="big-num">${s.total}</span>
          <span class="label">visit${s.total!==1?'s':''}</span>
        </div>
      </div>
      <div class="studio-body">
        <div class="info-chips">
          <span class="chip chip-day">📅 ${s.top_day}s</span>
          <span class="chip chip-type" title="${s.top_type}">🎯 ${s.top_type}</span>
        </div>

        <div class="day-section-label">Visits by day</div>
        <div class="day-bars">${dayBarsHtml}</div>

        <div class="types-section">
          <div class="types-label">Class types</div>
          <div class="type-pills">${typePillsHtml}</div>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

// ── CALENDAR PAGE ────────────────────────────────────────────────
let calBuilt = false;
let calRendered = {};

const MONTHS_NAMES = ['January','February','March','April','May','June',
                      'July','August','September','October','November','December'];
const DOW_NAMES = ['Su','Mo','Tu','We','Th','Fr','Sa'];
const TODAY = '2026-04-06';

function buildCalendarPage() {
  if (calBuilt) return;
  calBuilt = true;

  const years = Object.keys(DATA.years).sort();
  const selector = document.getElementById('cal-year-selector');
  const panels = document.getElementById('cal-panels');

  years.forEach((y, i) => {
    const btn = document.createElement('button');
    btn.className = 'year-pill' + (i === 0 ? ' active' : '');
    btn.textContent = y;
    btn.onclick = () => selectCalYear(y);
    selector.appendChild(btn);

    const panel = document.createElement('div');
    panel.className = 'cal-content' + (i === 0 ? ' active' : '');
    panel.id = 'cal-' + y;

    const yTotal = DATA.years[y].total;
    panel.innerHTML = `
      <div class="cal-year-total">
        <span>You completed</span>
        <strong>${yTotal} classes</strong>
        <span>in ${y}</span>
      </div>
      <div class="months-grid" id="months-${y}"></div>
      <div class="cal-legend" id="legend-${y}">
        <div class="cal-legend-title">Studios</div>
        <div class="legend-items" id="legend-items-${y}"></div>
      </div>
    `;
    panels.appendChild(panel);
    if (i === 0) renderCalYear(y);
  });
}

function selectCalYear(y) {
  document.querySelectorAll('#cal-year-selector .year-pill').forEach(b =>
    b.classList.toggle('active', b.textContent === y));
  document.querySelectorAll('.cal-content').forEach(p =>
    p.classList.toggle('active', p.id === 'cal-' + y));
  if (!calRendered[y]) renderCalYear(y);
}

function renderCalYear(y) {
  calRendered[y] = true;
  const grid = document.getElementById('months-' + y);
  const legendItems = document.getElementById('legend-items-' + y);
  const studiosUsed = {};

  for (let m = 0; m < 12; m++) {
    const firstDay = new Date(parseInt(y), m, 1);
    const daysInMonth = new Date(parseInt(y), m + 1, 0).getDate();
    const startDow = firstDay.getDay();

    const card = document.createElement('div');
    card.className = 'month-card';

    let html = `<div class="month-name">${MONTHS_NAMES[m]}</div>`;
    html += `<div class="dow-headers">${DOW_NAMES.map(d => `<div class="dow-header">${d}</div>`).join('')}</div>`;
    html += `<div class="day-grid">`;

    for (let blank = 0; blank < startDow; blank++) {
      html += `<div class="day-cell empty"></div>`;
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const mm = String(m + 1).padStart(2, '0');
      const dd = String(d).padStart(2, '0');
      const dateStr = `${y}-${mm}-${dd}`;
      const entry = DATA.calendar[dateStr];

      if (dateStr > TODAY) {
        html += `<div class="day-cell empty"></div>`;
      } else if (entry) {
        studiosUsed[entry.class] = entry.color;
        // Pick text colour based on brightness
        const r = parseInt(entry.color.slice(1,3),16);
        const g = parseInt(entry.color.slice(3,5),16);
        const b = parseInt(entry.color.slice(5,7),16);
        const bright = (r*299 + g*587 + b*114) / 1000;
        const txtColor = bright > 140 ? '#000' : '#fff';
        html += `<div class="day-cell worked-out" style="background:${entry.color};color:${txtColor}" title="${entry.class} — ${dateStr}">
          <span class="day-num">${d}</span>
        </div>`;
      } else {
        html += `<div class="day-cell no-entry" title="${dateStr}">
          <span class="day-num">${d}</span>
        </div>`;
      }
    }

    html += `</div>`;
    card.innerHTML = html;
    grid.appendChild(card);
  }

  // Render legend
  legendItems.innerHTML = Object.entries(studiosUsed)
    .sort((a, b) => a[0].localeCompare(b[0]))
    .map(([name, color]) => `
      <div class="legend-item">
        <div class="legend-dot" style="background:${color}"></div>
        <span>${name}</span>
      </div>`)
    .join('');
}

// ── INIT ─────────────────────────────────────────────────────────
buildYearPage();
</script>
